services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    image: hyena-clean-postgres:16-pst
    container_name: hyena_clean_postgres
    environment:
      POSTGRES_DB: hyena
      POSTGRES_USER: hyena
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hyena_pw}
    ports:
      - "55432:5432"
    volumes:
      - hyena_clean_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: hyena_clean_qdrant
    profiles: ["ai"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - hyena_clean_qdrant:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20
    container_name: hyena_clean_neo4j
    profiles: ["ai"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-hyena_neo4j_pw}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - hyena_clean_neo4j:/data
      - hyena_clean_neo4j_logs:/logs
    restart: unless-stopped

volumes:
  hyena_clean_pgdata:
  hyena_clean_qdrant:
  hyena_clean_neo4j:
  hyena_clean_neo4j_logs:
